<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--nav-bg:rgba(29,29,31,0.92);--hero-bg:#6b7a52;--hero-bg-dark:#4d5c3a;--white:#fff;--amber:#e8a020;--dark:#1d1d1f;--mid:#444;--light:#86868b;--border:#d2d2d7;--card-bg:#F6F3EC}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--dark);background:var(--white);-webkit-font-smoothing:antialiased}
nav{background:var(--nav-bg);padding:0 52px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:saturate(180%) blur(20px)}
.nav-brand{color:var(--white);font-size:14px;font-weight:400;text-decoration:none}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{color:rgba(255,255,255,0.72);font-size:12px;text-decoration:none;transition:color 0.2s}
.nav-links a:hover,.nav-links a.active{color:var(--white)}
.hamburger{display:none}
footer{background:#1d1d1f;padding:52px}
.footer-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.footer-email{font-size:15px;color:rgba(255,255,255,0.75);font-weight:300;text-decoration:none}
.cv-hero{background:var(--hero-bg);padding:72px 52px;position:relative;overflow:hidden}
.cv-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,var(--hero-bg-dark),var(--hero-bg));opacity:0.6}
.cv-hero-inner{position:relative}
.cv-hero h1{font-family:'Fraunces',serif;font-size:clamp(32px,4vw,48px);font-weight:700;color:var(--white);letter-spacing:-0.03em;line-height:1.1;margin-bottom:8px;animation:fadeUp 0.7s ease both}
.cv-hero p{font-size:15px;color:rgba(255,255,255,0.75);animation:fadeUp 0.7s 0.1s ease both}
.cv-body{padding:64px 52px;max-width:1000px;margin:0 auto}
.cv-img-wrap{border-radius:12px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.1)}
.cv-img-wrap img{width:100%;display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .cv-hero,.cv-body{padding-left:20px;padding-right:20px}
  nav{padding:0 20px;position:relative}
  .nav-links{display:none;position:absolute;top:52px;left:0;right:0;background:#1d1d1f;flex-direction:column;gap:0;padding:8px 0 16px;z-index:200}
  .nav-links.open{display:flex}
  .nav-links li a{display:block;padding:12px 20px;font-size:14px}
  .hamburger{display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
  .hamburger span{display:block;width:22px;height:2px;background:rgba(255,255,255,0.75);border-radius:2px}
  footer{padding:36px 20px}
}
</style>
